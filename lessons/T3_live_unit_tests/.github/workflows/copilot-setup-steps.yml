name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: copilot
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      EMPTY_USER_EMAIL: ${{ secrets.EMPTY_USER_EMAIL }}
      EMPTY_USER_PASSWORD: ${{ secrets.EMPTY_USER_PASSWORD }}
      EMPTY_USER_DISPLAY_NAME: ${{ vars.EMPTY_USER_DISPLAY_NAME }}
      DEMO_USER_EMAIL: ${{ secrets.DEMO_USER_EMAIL }}
      DEMO_USER_PASSWORD: ${{ secrets.DEMO_USER_PASSWORD }}
      DEMO_USER_DISPLAY_NAME: ${{ vars.DEMO_USER_DISPLAY_NAME }}
    permissions:
      contents: read
    services:
      rolnopol:
        image: jaktestowac/rolnopol:latest
        ports:
          - 3000:3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-browsers-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-browsers-

      - name: Install Playwright browsers
        if: steps.cache-browsers.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser dependencies
        if: steps.cache-browsers.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for rolnopol service
        shell: bash
        env:
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          target_url="${BASE_URL%/}"
          echo "Waiting for rolnopol service to be ready at ${target_url}..."

          for i in {1..30}; do
            if curl -sSf "${target_url}/health" >/dev/null || curl -sSf "${target_url}" >/dev/null; then
              echo "Service is ready!"
              exit 0
            fi

            echo "Attempt $i/30 failed, retrying in 2 seconds..."
            sleep 2
          done

          echo "Service failed to become ready after 60 seconds" >&2
          exit 1
