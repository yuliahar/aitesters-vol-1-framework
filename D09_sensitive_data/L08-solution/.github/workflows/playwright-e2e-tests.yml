name: Playwright Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 10
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      USER_DISPLAY_NAME: ${{ vars.USER_DISPLAY_NAME }}
    services:
      rolnopol:
        image: jaktestowac/rolnopol:latest
        ports:
          - 3000:3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-browsers-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-browsers-

      - name: Install Playwright browsers
        if: steps.cache-browsers.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser dependencies
        if: steps.cache-browsers.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for rolnopol service
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL is not set"
            exit 1
          fi
          TARGET_URL="${BASE_URL%/}"
          echo "Waiting for rolnopol service to be ready at ${TARGET_URL}..."
          for i in {1..30}; do
            if curl -sSf "${TARGET_URL}/health" || curl -sSf "${TARGET_URL}"; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 2 seconds..."
            sleep 2
          done
          echo "Service failed to become ready after 60 seconds"
          exit 1

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright HTML Report
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: rolnopol-${{ github.run_id }}-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 30
